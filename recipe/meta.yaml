{% set name = "httpx-sse" %}
{% set version = "0.4.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/h/httpx-sse/httpx_sse-0.4.3.tar.gz
  sha256: 9b1ed0127459a66014aec3c56bebd93da3c1bc8bb6618c8082039a44889a755d

build:
  skip: true  # [py<39]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python
    - setuptools
    - setuptools-scm
    - wheel
    - pip
  run:
    - python
    - httpx

test:
  source_files:
    - tests
  imports:
    - httpx_sse
  requires:
    - pip
    - pytest >=7.4.3
    - pytest-asyncio >=0.21.1
    - sse-starlette >=1.8.2
  commands:
    - pip check
    - python -c "from importlib.metadata import version; assert(version('{{ name }}')=='{{ version }}')"
    - pytest -vv tests

about:
  summary: Consume Server-Sent Event (SSE) messages with HTTPX.
  description: |
    httpx-sse provides the connect_sse and aconnect_sse helpers for connecting to an SSE endpoint.
    The resulting EventSource object exposes the .iter_sse() and .aiter_sse() methods to iterate over the server-sent events.
  home: https://github.com/florimondmanca/httpx-sse
  license: MIT
  license_file: LICENSE
  license_family: MIT
  doc_url: https://github.com/florimondmanca/httpx-sse
  dev_url: https://github.com/florimondmanca/httpx-sse

extra:
  recipe-maintainers:
    - jan-janssen
